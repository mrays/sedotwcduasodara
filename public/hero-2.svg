<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad2)"/>
  
  <!-- Truck illustration variant 2 -->
  <g transform="translate(250, 120)">
    <!-- Truck body -->
    <rect x="0" y="120" width="400" height="160" fill="#dc2626" rx="10"/>
    <!-- Truck cabin -->
    <rect x="370" y="90" width="90" height="130" fill="#991b1b" rx="5"/>
    <!-- Window -->
    <rect x="380" y="105" width="70" height="55" fill="#fbbf24"/>
    <!-- Wheels -->
    <circle cx="100" cy="300" r="40" fill="#1f2937"/>
    <circle cx="100" cy="300" r="28" fill="#6b7280"/>
    <circle cx="320" cy="300" r="40" fill="#1f2937"/>
    <circle cx="320" cy="300" r="28" fill="#6b7280"/>
    <circle cx="400" cy="300" r="30" fill="#1f2937"/>
    <circle cx="400" cy="300" r="20" fill="#6b7280"/>
    <!-- Tank area -->
    <path d="M 60 120 Q 50 200 70 270 L 330 270 Q 350 200 340 120" fill="#f87171"/>
    <!-- Service badge -->
    <circle cx="200" cy="180" r="50" fill="rgba(255,255,255,0.9)"/>
    <text x="200" y="175" font-size="24" font-weight="bold" text-anchor="middle" fill="#dc2626">24 JAM</text>
    <text x="200" y="200" font-size="14" text-anchor="middle" fill="#dc2626">SIAP</text>
  </g>
  
  <!-- Text overlay -->
  <text x="600" y="580" font-size="28" font-weight="bold" text-anchor="middle" fill="white">Armada Lengkap & Modern</text>
</svg>