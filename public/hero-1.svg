<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad1)"/>
  
  <!-- Truck illustration -->
  <g transform="translate(300, 150)">
    <!-- Truck body -->
    <rect x="0" y="100" width="350" height="150" fill="#1e40af" rx="10"/>
    <!-- Truck cabin -->
    <rect x="320" y="80" width="80" height="120" fill="#1e3a8a" rx="5"/>
    <!-- Window -->
    <rect x="330" y="90" width="60" height="50" fill="#93c5fd"/>
    <!-- Wheel 1 -->
    <circle cx="80" cy="280" r="35" fill="#374151"/>
    <circle cx="80" cy="280" r="25" fill="#4b5563"/>
    <!-- Wheel 2 -->
    <circle cx="280" cy="280" r="35" fill="#374151"/>
    <circle cx="280" cy="280" r="25" fill="#4b5563"/>
    <!-- Wheel 3 -->
    <circle cx="350" cy="280" r="25" fill="#374151"/>
    <!-- Tank/Container top -->
    <ellipse cx="175" cy="100" rx="120" ry="40" fill="#0ea5e9"/>
    <!-- Tank/Container sides -->
    <path d="M 55 100 Q 50 180 60 240 L 290 240 Q 300 180 295 100" fill="#06b6d4"/>
    <!-- Logo text -->
    <text x="175" y="200" font-size="32" font-weight="bold" text-anchor="middle" fill="white">SEDOT WC</text>
    <!-- Company name -->
    <text x="175" y="240" font-size="24" text-anchor="middle" fill="white">Dua Sodara</text>
  </g>
  
  <!-- Text overlay -->
  <text x="600" y="580" font-size="28" font-weight="bold" text-anchor="middle" fill="white">Layanan Sedot WC Profesional 24 Jam</text>
</svg>