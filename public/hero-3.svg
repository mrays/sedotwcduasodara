<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#grad3)"/>
  
  <!-- Simple truck shape -->
  <g transform="translate(150, 120)">
    <!-- Truck body -->
    <rect x="0" y="120" width="450" height="180" fill="#1e293b" rx="15"/>
    <!-- Tank -->
    <ellipse cx="225" cy="120" rx="140" ry="50" fill="#06b6d4"/>
    <path d="M 85 120 Q 75 200 95 290 L 355 290 Q 375 200 365 120" fill="#22d3ee"/>
    <!-- Wheels -->
    <circle cx="120" cy="310" r="45" fill="#1f2937"/>
    <circle cx="120" cy="310" r="28" fill="#4b5563"/>
    <circle cx="320" cy="310" r="45" fill="#1f2937"/>
    <circle cx="320" cy="310" r="28" fill="#4b5563"/>
    <!-- Text -->
    <text x="225" y="200" font-size="28" font-weight="bold" text-anchor="middle" fill="white">DUA SODARA</text>
  </g>
  
  <!-- Bottom text -->
  <text x="600" y="580" font-size="24" font-weight="bold" text-anchor="middle" fill="white">Bersih, Cepat & Profesional</text>
</svg>